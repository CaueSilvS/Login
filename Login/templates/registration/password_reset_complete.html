{% extends 'base.html' %}

{% block title %}Senha Redefinida | Painel{% endblock %}

{% block body %}
<div class="login-page">
    <div class="brand">Painel</div>

    <div class="login-card">
        <h2 class="card-title">Senha Redefinida</h2>
        <div class="card-message">
            <p>Sua senha foi redefinida com sucesso.</p>
            <p class="card-message-hint">Agora você já pode fazer login com a nova senha.</p>
        </div>

        <div class="card-links">
            <a href="{% url 'login' %}" class="card-link">Ir para o login</a>
        </div>
    </div>

    <p class="page-footer">&copy; 2026 Painel. Todos os direitos reservados.</p>
</div>
{% endblock %}
