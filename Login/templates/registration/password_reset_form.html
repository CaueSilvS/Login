{% extends 'base.html' %}

{% block title %}Recuperar Senha | Painel{% endblock %}

{% block body %}
<div class="login-page">
    <div class="brand">Painel</div>

    <div class="login-card">
        <h2 class="card-title">Recuperar Senha</h2>
        <p class="card-description">Informe o e-mail cadastrado e enviaremos um link para redefinir sua senha.</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <div class="input-icon-wrapper">
                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z"/>
                        </svg>
                    </span>
                    <input type="email" id="id_email" name="email"
                           placeholder="E-mail"
                           autocomplete="email" required>
                </div>
            </div>

            <div class="submit-row">
                <button type="submit">Enviar link ›</button>
            </div>
        </form>

        <div class="card-links">
            <a href="{% url 'login' %}" class="card-link">Voltar ao login</a>
        </div>
    </div>

    <p class="page-footer">&copy; 2026 Painel. Todos os direitos reservados.</p>
</div>
{% endblock %}
